<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SPMS - Smart Procurement Management System</title>
    <link rel="stylesheet" href="css/style.css" />
    <!-- FontAwesome for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div id="notification-area" class="notification-container"></div>

    <div class="auth-container">
      <div class="glass-panel auth-box">
        <div class="text-center mb-4">
          <h1 class="brand" style="font-size: 2.5rem"><span>SP</span>MS</h1>
          <p style="color: var(--text-secondary); margin-top: 0.5rem">
            Smart Procurement Management System
          </p>
        </div>

        <!-- Login Form -->
        <div id="login-form">
          <h2 class="mb-4">Welcome Back</h2>
          <form id="form-login">
            <div class="form-group">
              <label>Email Address</label>
              <input
                type="email"
                id="login-email"
                class="form-control"
                placeholder="Enter your email"
                required
              />
            </div>
            <div class="form-group">
              <label>Password</label>
              <input
                type="password"
                id="login-password"
                class="form-control"
                placeholder="Enter your password"
                required
              />
            </div>
            <button type="submit" class="btn btn-primary btn-block mt-4">
              <i class="fas fa-sign-in-alt"></i> Login
            </button>
          </form>
          <div class="text-center mt-4">
            <p style="color: var(--text-secondary)">
              Don't have an account?
              <a
                href="#"
                id="show-register"
                style="
                  color: var(--accent-primary);
                  text-decoration: none;
                  font-weight: 600;
                "
                >Register here</a
              >
            </p>
          </div>
        </div>

        <!-- Register Form -->
        <div id="register-form" class="hidden">
          <h2 class="mb-4">Create Account</h2>
          <form id="form-register">
            <div class="form-group">
              <label>Full Name</label>
              <input
                type="text"
                id="reg-name"
                class="form-control"
                placeholder="Enter your name"
                required
              />
            </div>
            <div class="form-group">
              <label>Email Address</label>
              <input
                type="email"
                id="reg-email"
                class="form-control"
                placeholder="Enter your email"
                required
              />
            </div>
            <div class="form-group">
              <label>Role</label>
              <select id="reg-role" class="form-control" required>
                <option value="">Select Role</option>
                <option value="Customer">Customer (Buyer)</option>
                <option value="Seller">Seller (Vendor)</option>
                <option value="Admin">Administrator</option>
              </select>
            </div>
            <div class="form-group">
              <label>Password</label>
              <input
                type="password"
                id="reg-password"
                class="form-control"
                placeholder="Create a password"
                required
              />
            </div>
            <button type="submit" class="btn btn-success btn-block mt-4">
              <i class="fas fa-user-plus"></i> Register
            </button>
          </form>
          <div class="text-center mt-4">
            <p style="color: var(--text-secondary)">
              Already have an account?
              <a
                href="#"
                id="show-login"
                style="
                  color: var(--accent-primary);
                  text-decoration: none;
                  font-weight: 600;
                "
                >Login here</a
              >
            </p>
          </div>
        </div>
      </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
